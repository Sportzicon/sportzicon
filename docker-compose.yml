# Local development stack for Sportivox.
# Spins up: PostgreSQL, fake-gcs-server (S3-like GCS), the API, and the web app.
# Usage: docker compose up --build
version: "3.9"

services:
  # PostgreSQL moved to Supabase (cloud database)
  # For local PostgreSQL, use: docker run -d --name postgres -e POSTGRES_PASSWORD=localdev -p 5432:5432 postgres:15-alpine

  gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-public-host", "localhost:4443", "-port", "4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcs-data:/storage

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: dev
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://postgres.vrybsjdrftpoaexnffyv:Sportivox%402026@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require&pgbouncer=true
      DIRECT_URL: postgresql://postgres:Sportivox%402026@db.vrybsjdrftpoaexnffyv.supabase.co:5432/postgres?sslmode=require
      STORAGE_EMULATOR_HOST: http://gcs:4443
      GCP_PROJECT_ID: sportivox-dev
      GCS_BUCKET_MEDIA: sportivox-media-dev
      GCS_BUCKET_DOCS: sportivox-docs-dev
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      BCRYPT_ROUNDS: 12
      CORS_ORIGINS: http://localhost:5173
      WEB_APP_URL: http://localhost:5173
      PUBLIC_API_URL: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_MAX: 50
      LOG_LEVEL: debug
      BOOTSTRAP_ADMIN_EMAIL: admin@sportivox.local
      BOOTSTRAP_ADMIN_PASSWORD: ChangeMe123!
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./database:/app/../database
      - ./database:/database
    depends_on:
      gcs:
        condition: service_started

  scoring-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scoring_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # No host port binding — only needs to be reachable by scoring-backend on the internal network.
    # To connect via psql/Prisma Studio from host: temporarily add "5434:5432" here.
    volumes:
      - scoring_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  scoring-backend:
    build:
      context: ./scoring/backend
      dockerfile: Dockerfile.dev
    # No host port needed — web container reaches this via internal network as http://scoring-backend:4000
    # To expose for direct access/debugging: add "4001:4000" here (avoids conflict with local dev on 4000)
    environment:
      DATABASE_URL: postgresql://postgres:postgres@scoring-db:5432/scoring_db
      JWT_SECRET: dev-secret-change-in-prod
      MAIN_JWT_SECRET: dev-access-secret-change-me
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
      NODE_ENV: development
    depends_on:
      scoring-db:
        condition: service_healthy
    volumes:
      - ./scoring/backend/src:/app/src
    command: sh -c "npx prisma db push --skip-generate && npm run dev"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      SCORING_API_URL: http://scoring-backend:4000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - api
      - scoring-backend

volumes:
  gcs-data: {}
  scoring_pgdata: {}
