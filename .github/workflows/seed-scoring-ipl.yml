name: Seed Scoring — IPL 2026 Final

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "seed" to confirm (idempotent — safe to re-run)'
        required: true
        default: ''

jobs:
  seed:
    name: Run IPL 2026 seed on staging scoring DB
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'seed'

    defaults:
      run:
        working-directory: scoring/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scoring/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.SCORING_DATABASE_URL }}

      - name: Run IPL 2026 Final seed
        run: npx tsx prisma/seed-ipl2026-final.ts
        env:
          DATABASE_URL: ${{ secrets.SCORING_DATABASE_URL }}
