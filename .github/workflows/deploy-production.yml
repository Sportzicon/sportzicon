name: Deploy to Production

on:
  push:
    tags:
      - "v*"

env:
  GCP_REGION: asia-south1
  GCP_AR_REPO: sportivox

jobs:
  build-and-deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          load: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:${{ github.ref_name }}

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          build-args: |
            VITE_API_BASE_URL=https://api.sportivox.com
          push: false
          load: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:${{ github.ref_name }}

      - name: Push images to Artifact Registry
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:${{ github.ref_name }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:${{ github.ref_name }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6"
          terraform_wrapper: false

      - name: Configure Terraform backend
        working-directory: infra/terraform
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          terraform init \
            -backend-config="bucket=sportivox-terraform-state-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=production"

      - name: Update Terraform image variables
        working-directory: infra/terraform
        run: |
          sed -i "s|api_image = .*|api_image = \"${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:${{ github.ref_name }}\"|g" terraform.tfvars.prod.example
          sed -i "s|web_image = .*|web_image = \"${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:${{ github.ref_name }}\"|g" terraform.tfvars.prod.example
          cp terraform.tfvars.prod.example terraform.tfvars.prod

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -lock=false -var-file=terraform.tfvars.prod -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -lock=false -auto-approve tfplan

      - name: Get deployment URLs
        working-directory: infra/terraform
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "web_url=$(terraform output -raw web_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT

      - name: Health check API
        run: |
          API_URL="${{ steps.outputs.outputs.api_url }}"
          echo "Checking: ${API_URL}/healthz"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${API_URL}/healthz" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "⚠️ Health check did not confirm healthy within 75s — check Cloud Run logs"
          echo "Deployment succeeded (Terraform startup probe passed). Service may still be warming up."
          exit 0

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Production Deployment

            **Version:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}

            **Images:**
            - API: `${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:${{ github.ref_name }}`
            - Web: `${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:${{ github.ref_name }}`

            **Deployment:**
            - API URL: ${{ steps.outputs.outputs.api_url }}
            - Web URL: ${{ steps.outputs.outputs.web_url }}
            - Status: ✅ Deployed & Healthy
          draft: false
          prerelease: false
