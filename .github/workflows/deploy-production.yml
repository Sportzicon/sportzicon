name: Deploy to Production

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  AR_IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sportivox

jobs:
  migrate-main-db:
    name: Migrate Main DB
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: database/package-lock.json

      - name: Run main database migrations
        working-directory: database
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm ci --no-audit --no-fund
          echo "Running migrations on production database..."

          set +e
          OUTPUT=$(npx prisma migrate deploy 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "P1001\|P1002\|P1003"; then
              echo "⚠️ Database unreachable — skipping migrations. Existing schema assumed current."
              exit 0
            elif echo "$OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: database has no migration history — baselining latest migration..."
              LATEST=$(ls prisma/migrations | grep -v migration_lock | sort | tail -1)
              echo "Baselining: $LATEST"
              npx prisma migrate resolve --applied "$LATEST"
              npx prisma migrate deploy
            elif echo "$OUTPUT" | grep -q "P3018\|P3009"; then
              echo "⚠️  P3018/P3009: failed migration in DB — rolling it back and retrying..."
              FAILED=$(echo "$OUTPUT" | grep -oP "Migration name: \K\S+" | head -1)
              if [ -z "$FAILED" ]; then
                FAILED=$(echo "$OUTPUT" | grep -oP "The \`\K[^\`]+" | head -1)
              fi
              echo "Rolling back: $FAILED"
              npx prisma migrate resolve --rolled-back "$FAILED"
              npx prisma migrate deploy
            else
              exit $EXIT_CODE
            fi
          fi
          echo "✅ Main DB migrations complete"

  migrate-scoring-db:
    name: Migrate Scoring DB
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: scoring/backend/package-lock.json

      - name: Run scoring database migrations
        working-directory: scoring/backend
        env:
          DATABASE_URL: ${{ secrets.SCORING_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.SCORING_DIRECT_URL }}
        run: |
          npm ci --no-audit --no-fund
          echo "Running migrations on scoring production database..."

          set +e
          OUTPUT=$(npx prisma migrate deploy 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "P1001\|P1002\|P1003"; then
              echo "⚠️ Scoring database unreachable — skipping migrations. Existing schema assumed current."
              exit 0
            elif echo "$OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: scoring database has no migration history — baselining latest migration..."
              LATEST=$(ls prisma/migrations | grep -v migration_lock | sort | tail -1)
              echo "Baselining: $LATEST"
              npx prisma migrate resolve --applied "$LATEST"
              npx prisma migrate deploy
            else
              exit $EXIT_CODE
            fi
          fi
          echo "✅ Scoring DB migrations complete"

  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha,scope=api-prod
          cache-to: type=gha,mode=max,scope=api-prod
          tags: |
            ${{ env.AR_IMAGE }}/api:${{ github.ref_name }}
            ${{ env.AR_IMAGE }}/api:latest

  build-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha,scope=web-prod
          cache-to: type=gha,mode=max,scope=web-prod
          build-args: |
            VITE_API_BASE_URL=https://api.sportzicon.com
            VITE_SCORING_API_URL=https://scoring-api.sportzicon.com/api
          tags: |
            ${{ env.AR_IMAGE }}/web:${{ github.ref_name }}
            ${{ env.AR_IMAGE }}/web:latest

  build-scoring-api:
    name: Build & Push Scoring API Image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Scoring API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scoring/backend/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha,scope=scoring-api-prod
          cache-to: type=gha,mode=max,scope=scoring-api-prod
          tags: |
            ${{ env.AR_IMAGE }}/scoring-api:${{ github.ref_name }}
            ${{ env.AR_IMAGE }}/scoring-api:latest

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: production
    needs:
      - migrate-main-db
      - migrate-scoring-db
      - build-api
      - build-web
      - build-scoring-api
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6"
          terraform_wrapper: false

      - name: Configure Terraform backend
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=sportivox-terraform-state-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=production"

      - name: Update Terraform image variables
        working-directory: infra/terraform
        run: |
          sed -i "s|api_image = .*|api_image = \"${{ env.AR_IMAGE }}/api:${{ github.ref_name }}\"|g" terraform.tfvars.prod.example
          sed -i "s|web_image = .*|web_image = \"${{ env.AR_IMAGE }}/web:${{ github.ref_name }}\"|g" terraform.tfvars.prod.example
          sed -i "s|scoring_api_image = .*|scoring_api_image = \"${{ env.AR_IMAGE }}/scoring-api:${{ github.ref_name }}\"|g" terraform.tfvars.prod.example
          cp terraform.tfvars.prod.example terraform.tfvars.prod

      - name: Import existing scoring Cloud Run service into Terraform state
        working-directory: infra/terraform
        run: |
          # Scoring API was manually deployed before Terraform managed it.
          # Import it so Terraform updates rather than tries to re-create (409).
          # || true — no-op if already in state or doesn't exist yet.
          terraform import \
            -var-file=terraform.tfvars.prod \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="direct_url=${{ secrets.DIRECT_URL }}" \
            -var="scoring_database_url=${{ secrets.SCORING_DATABASE_URL }}" \
            -var="scoring_direct_url=${{ secrets.SCORING_DIRECT_URL }}" \
            -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
            'google_cloud_run_v2_service.scoring_api[0]' \
            "projects/${{ secrets.GCP_PROJECT_ID }}/locations/asia-south1/services/sportivox-scoring-api-prod" \
            2>&1 || true

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan -lock=false \
            -var-file=terraform.tfvars.prod \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="direct_url=${{ secrets.DIRECT_URL }}" \
            -var="scoring_database_url=${{ secrets.SCORING_DATABASE_URL }}" \
            -var="scoring_direct_url=${{ secrets.SCORING_DIRECT_URL }}" \
            -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -lock=false -auto-approve tfplan

      - name: Get deployment URLs
        working-directory: infra/terraform
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "web_url=$(terraform output -raw web_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "scoring_api_url=$(terraform output -raw scoring_api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT

      - name: Health check API
        run: |
          API_URL="${{ steps.outputs.outputs.api_url }}"
          echo "Checking: ${API_URL}/internal/livez"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${API_URL}/internal/livez" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "⚠️ Health check did not confirm healthy within 75s — check Cloud Run logs"
          exit 0

      - name: Health check Scoring API
        run: |
          SCORING_API_URL="${{ steps.outputs.outputs.scoring_api_url }}"
          echo "Checking: ${SCORING_API_URL}/internal/livez"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${SCORING_API_URL}/internal/livez" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ Scoring API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "⚠️ Scoring API health check did not confirm healthy within 75s — check Cloud Run logs"
          exit 0

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Production Deployment

            **Version:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}

            **Images:**
            - API: `${{ env.AR_IMAGE }}/api:${{ github.ref_name }}`
            - Web: `${{ env.AR_IMAGE }}/web:${{ github.ref_name }}`

            **Deployment:**
            - API URL: ${{ steps.outputs.outputs.api_url }}
            - Web URL: ${{ steps.outputs.outputs.web_url }}
            - Status: Deployed & Healthy
          draft: false
          prerelease: false
