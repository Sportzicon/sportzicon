name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      firestore:
        image: mtlynch/firestore-emulator:latest
        ports:
          - 8081:8081
        env:
          FIRESTORE_PROJECT_ID: sportivox-test
          PORT: 8081
    env:
      FIRESTORE_EMULATOR_HOST: localhost:8081
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm install --no-audit --no-fund
      - name: Wait for Firestore emulator
        run: |
          for i in {1..40}; do
            if curl -sf "http://localhost:8081" >/dev/null; then exit 0; fi
            sleep 1
          done
          echo "Firestore emulator never became ready" && exit 1
      - working-directory: backend
        run: npm run typecheck

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm install --no-audit --no-fund
      - working-directory: frontend
        run: npm run build
