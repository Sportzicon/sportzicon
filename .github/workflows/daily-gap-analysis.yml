name: Daily gap analysis

# Runs scripts/gap-analysis/gap-analysis.mjs against main and:
#   - commits the report to reports/gap-analysis/<date>.md
#   - opens or updates a tracking issue with the P0/P1 summary
#   - fails the workflow run if any P0 finding is present

on:
  schedule:
    - cron: "30 7 * * *"  # 07:30 UTC daily ≈ 13:00 IST
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/gap-analysis/**"
      - ".github/workflows/daily-gap-analysis.yml"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            scoring/backend/package-lock.json
            scoring/frontend/package-lock.json

      # Install only what's needed for `npm audit` to find lockfiles
      - name: Install backend deps (for audit)
        run: |
          for dir in backend frontend scoring/backend scoring/frontend; do
            if [ -f "$dir/package-lock.json" ]; then
              echo "→ npm ci in $dir"
              (cd "$dir" && npm ci --no-audit --no-fund --ignore-scripts) || true
            fi
          done

      - name: Run gap analysis
        id: gap
        run: |
          set +e
          node scripts/gap-analysis/gap-analysis.mjs
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: gap-analysis-${{ github.run_id }}
          path: reports/gap-analysis/

      - name: Commit report to main (idempotent)
        if: github.event_name != 'pull_request'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/gap-analysis/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
            exit 0
          fi
          git commit -m "chore(gap-analysis): daily report $(date -u +%F)"
          git push

      - name: Update tracking issue
        if: github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const today = new Date().toISOString().slice(0, 10);
            const reportPath = `reports/gap-analysis/${today}.md`;
            if (!fs.existsSync(reportPath)) {
              core.warning(`Report not found at ${reportPath}`);
              return;
            }
            const body = fs.readFileSync(reportPath, "utf8");
            const title = `🔍 Daily gap analysis tracker`;
            const repo = context.repo;

            const { data: issues } = await github.rest.issues.listForRepo({
              ...repo, state: "open", labels: "gap-analysis"
            });
            const existing = issues.find(i => i.title === title);

            const truncated = body.length > 60000 ? body.slice(0, 60000) + "\n\n_…truncated; see report file._" : body;

            if (existing) {
              await github.rest.issues.update({
                ...repo, issue_number: existing.number, body: truncated
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({
                ...repo, title, body: truncated, labels: ["gap-analysis"]
              });
              core.info(`Created issue #${created.number}`);
            }

      - name: Fail workflow if P0 findings exist
        if: steps.gap.outputs.exit_code == '2'
        run: |
          echo "::error::P0 (critical) gap-analysis findings present — see reports/gap-analysis/latest.md"
          exit 1
