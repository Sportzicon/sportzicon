name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  AR_IMAGE: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/sportivox

jobs:
  migrate-main-db:
    name: Migrate Main DB
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: database/package-lock.json

      - name: Run main database migrations
        working-directory: database
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm ci --no-audit --no-fund

          set +e
          OUTPUT=$(npx prisma migrate deploy 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "P1002" && echo "$OUTPUT" | grep -qi "advisory lock"; then
              echo "⚠️  P1002: advisory lock timeout (stale connection, not real unreachability) — clearing and retrying..."
              npx tsx scripts/clear-stale-migration-lock.ts || true

              set +e
              OUTPUT2=$(npx prisma migrate deploy 2>&1)
              EXIT_CODE2=$?
              set -e
              echo "$OUTPUT2"

              if [ $EXIT_CODE2 -ne 0 ]; then
                echo "❌ Still failing after clearing the stale advisory lock — NOT blocking this deploy."
                echo "   Cloud Run's own 'prisma migrate deploy && node dist/server.js' at container boot"
                echo "   (backend/Dockerfile) is the authoritative gate and will keep traffic on the"
                echo "   previous revision if it also fails there. Investigate manually:"
                echo "$OUTPUT2"
                exit 0
              fi
            elif echo "$OUTPUT" | grep -q "P1001\|P1002\|P1003"; then
              echo "⚠️ Database unreachable — skipping migrations. Existing schema assumed current."
              exit 0
            elif echo "$OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: database has no migration history — baselining latest migration..."
              LATEST=$(ls prisma/migrations | grep -v migration_lock | sort | tail -1)
              echo "Baselining: $LATEST"
              npx prisma migrate resolve --applied "$LATEST"
              npx prisma migrate deploy
            elif echo "$OUTPUT" | grep -q "P3018\|P3009"; then
              echo "⚠️  P3018/P3009: failed migration in DB — rolling it back and retrying..."
              FAILED=$(echo "$OUTPUT" | grep -oP "Migration name: \K\S+" | head -1)
              if [ -z "$FAILED" ]; then
                FAILED=$(echo "$OUTPUT" | grep -oP "The \`\K[^\`]+" | head -1)
              fi
              echo "Rolling back: $FAILED"
              npx prisma migrate resolve --rolled-back "$FAILED"
              npx prisma migrate deploy
            else
              exit $EXIT_CODE
            fi
          fi
          echo "✅ Main DB migrations complete"

  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          tags: |
            ${{ env.AR_IMAGE }}/api:latest
            ${{ env.AR_IMAGE }}/api:main-${{ github.sha }}

  build-web:
    name: Build & Push Web Image
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            VITE_API_BASE_URL=https://staging-api.sportzicon.com
            VITE_SCORING_API_URL=https://staging-scoring-api.sportzicon.com/api
          tags: |
            ${{ env.AR_IMAGE }}/web:latest
            ${{ env.AR_IMAGE }}/web:main-${{ github.sha }}

  build-scoring-api:
    name: Build & Push Scoring API Image
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Scoring API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./scoring/backend/Dockerfile
          target: runtime
          push: true
          cache-from: type=gha,scope=scoring-api
          cache-to: type=gha,mode=max,scope=scoring-api
          tags: |
            ${{ env.AR_IMAGE }}/scoring-api:latest
            ${{ env.AR_IMAGE }}/scoring-api:main-${{ github.sha }}

  deploy:
    name: Terraform Deploy
    runs-on: ubuntu-latest
    environment: staging
    needs:
      - migrate-main-db
      - build-api
      - build-web
      - build-scoring-api
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6"
          terraform_wrapper: false

      - name: Configure Terraform backend
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=sportivox-terraform-state-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=staging"

      - name: Update Terraform image variables
        working-directory: infra/terraform
        run: |
          sed -i "s|api_image = .*|api_image = \"${{ env.AR_IMAGE }}/api:main-${{ github.sha }}\"|g" terraform.tfvars.staging
          sed -i "s|web_image = .*|web_image = \"${{ env.AR_IMAGE }}/web:main-${{ github.sha }}\"|g" terraform.tfvars.staging
          sed -i "s|scoring_api_image = .*|scoring_api_image = \"${{ env.AR_IMAGE }}/scoring-api:main-${{ github.sha }}\"|g" terraform.tfvars.staging

      - name: Import existing scoring Cloud Run service into Terraform state
        working-directory: infra/terraform
        run: |
          # Scoring API was manually deployed before Terraform managed it.
          # Import it so Terraform updates rather than tries to re-create (409).
          # Check state directly instead of grepping import output for known
          # phrases — `cmd | tee file || grep ...` silently no-ops on any
          # import failure whose message doesn't match, masking real errors
          # (this previously let staging scoring-api silently stop deploying).
          if ! terraform state show 'google_cloud_run_v2_service.scoring_api[0]' >/dev/null 2>&1; then
            terraform import \
              -var-file=terraform.tfvars.staging \
              -var="database_url=${{ secrets.DATABASE_URL }}" \
              -var="direct_url=${{ secrets.DIRECT_URL }}" \
              -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
              'google_cloud_run_v2_service.scoring_api[0]' \
              "projects/${{ secrets.GCP_PROJECT_ID }}/locations/asia-south1/services/sportivox-scoring-api-staging"
          fi

      - name: Import existing DIRECT_URL secret into Terraform state
        working-directory: infra/terraform
        run: |
          # The sportivox-direct-url-staging secret was created outside this
          # Terraform workspace's state (different GCS prefix). Import it so
          # Terraform manages it without a 409 re-creation error.
          if ! terraform state show 'google_secret_manager_secret.direct_url' >/dev/null 2>&1; then
            terraform import \
              -var-file=terraform.tfvars.staging \
              -var="database_url=${{ secrets.DATABASE_URL }}" \
              -var="direct_url=${{ secrets.DIRECT_URL }}" \
              -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
              'google_secret_manager_secret.direct_url' \
              "projects/${{ secrets.GCP_PROJECT_ID }}/secrets/sportivox-direct-url-staging"
          fi

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan \
            -var-file=terraform.tfvars.staging \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="direct_url=${{ secrets.DIRECT_URL }}" \
            -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Get deployment URLs
        working-directory: infra/terraform
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "web_url=$(terraform output -raw web_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "scoring_api_url=$(terraform output -raw scoring_api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT

      - name: Health check API
        run: |
          API_URL="${{ steps.outputs.outputs.api_url }}"
          echo "Checking: ${API_URL}/internal/livez"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${API_URL}/internal/livez" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "❌ Health check did not confirm healthy within 75s — check Cloud Run logs"
          exit 1

      - name: Health check Scoring API
        run: |
          SCORING_URL="${{ steps.outputs.outputs.scoring_api_url }}"
          echo "Checking: ${SCORING_URL}/internal/livez"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${SCORING_URL}/internal/livez" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ Scoring API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "❌ Scoring API health check did not confirm healthy — check Cloud Run logs"
          exit 1
