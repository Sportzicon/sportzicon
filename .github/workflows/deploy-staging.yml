name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image name (lowercase)
        run: echo "GHCR_IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/sportivox" >> $GITHUB_ENV

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GOOGLE_PROVIDER_NAME }}
          service_account: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: database/package-lock.json

      - name: Run database migrations
        working-directory: database
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: |
          npm ci --no-audit --no-fund

          set +e
          OUTPUT=$(npx prisma migrate deploy 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"

          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "P1001\|P1002\|P1003"; then
              echo "⚠️ Database unreachable — skipping migrations. Existing schema assumed current."
              exit 0
            elif echo "$OUTPUT" | grep -q "P3005"; then
              echo "⚠️  P3005: database has no migration history — baselining latest migration..."
              LATEST=$(ls prisma/migrations | grep -v migration_lock | sort | tail -1)
              echo "Baselining: $LATEST"
              npx prisma migrate resolve --applied "$LATEST"
              npx prisma migrate deploy
            else
              exit $EXIT_CODE
            fi
          fi
          echo "✅ Migrations complete"

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}/api:latest
            ${{ env.GHCR_IMAGE }}/api:main-${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          build-args: |
            VITE_API_BASE_URL=https://api.sportzicon.com
          tags: |
            ${{ env.GHCR_IMAGE }}/web:latest
            ${{ env.GHCR_IMAGE }}/web:main-${{ github.sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6"
          terraform_wrapper: false

      - name: Configure Terraform backend
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="bucket=sportivox-terraform-state-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=staging"

      - name: Update Terraform image variables
        working-directory: infra/terraform
        run: |
          sed -i "s|api_image = .*|api_image = \"${{ env.GHCR_IMAGE }}/api:main-${{ github.sha }}\"|g" terraform.tfvars.staging
          sed -i "s|web_image = .*|web_image = \"${{ env.GHCR_IMAGE }}/web:main-${{ github.sha }}\"|g" terraform.tfvars.staging

      - name: Terraform Plan
        working-directory: infra/terraform
        run: |
          terraform plan -lock=false \
            -var-file=terraform.tfvars.staging \
            -var="database_url=${{ secrets.DATABASE_URL }}" \
            -var="direct_url=${{ secrets.DIRECT_URL }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -lock=false -auto-approve tfplan

      - name: Get deployment URLs
        working-directory: infra/terraform
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "web_url=$(terraform output -raw web_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT

      - name: Health check API
        run: |
          API_URL="${{ steps.outputs.outputs.api_url }}"
          echo "Checking: ${API_URL}/healthz"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${API_URL}/healthz" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "⚠️ Health check did not confirm healthy within 75s — check Cloud Run logs"
          echo "Deployment succeeded (Terraform startup probe passed). Service may still be warming up."
          exit 0
