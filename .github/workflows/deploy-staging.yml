name: Deploy to Staging

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: sportivox-app
  GCP_REGION: asia-south1
  GCP_AR_REPO: sportivox

jobs:
  build-and-deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: false
          load: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:latest
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:main-${{ github.sha }}

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          build-args: |
            VITE_API_BASE_URL=https://placeholder.run.app
          push: false
          load: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:latest
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:main-${{ github.sha }}

      - name: Push images to Artifact Registry
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:latest
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:main-${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:latest
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:main-${{ github.sha }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.6"
          terraform_wrapper: false

      - name: Configure Terraform backend
        working-directory: infra/terraform
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          terraform init \
            -backend-config="bucket=sportivox-terraform-state-${{ env.GCP_PROJECT_ID }}" \
            -backend-config="prefix=staging"

      - name: Update Terraform image variables
        working-directory: infra/terraform
        run: |
          sed -i "s|api_image = .*|api_image = \"${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/api:main-${{ github.sha }}\"|g" terraform.tfvars.staging
          sed -i "s|web_image = .*|web_image = \"${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_AR_REPO }}/web:main-${{ github.sha }}\"|g" terraform.tfvars.staging

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -lock=false -var-file=terraform.tfvars.staging -out=tfplan

      - name: Terraform Apply
        working-directory: infra/terraform
        run: terraform apply -lock=false -auto-approve tfplan

      - name: Get deployment URLs
        working-directory: infra/terraform
        id: outputs
        run: |
          echo "api_url=$(terraform output -raw api_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT
          echo "web_url=$(terraform output -raw web_url 2>/dev/null || echo 'pending')" >> $GITHUB_OUTPUT

      - name: Health check API
        run: |
          API_URL="${{ steps.outputs.outputs.api_url }}"
          echo "Checking: ${API_URL}/healthz"
          for i in {1..15}; do
            RESPONSE=$(curl -sf --max-time 10 "${API_URL}/healthz" 2>/dev/null || echo "")
            if echo "$RESPONSE" | grep -q "ok"; then
              echo "✅ API is healthy: $RESPONSE"
              exit 0
            fi
            echo "⏳ Attempt $i/15 — waiting 5s..."
            sleep 5
          done
          echo "⚠️ Health check did not confirm healthy within 75s — check Cloud Run logs"
          echo "Deployment succeeded (Terraform startup probe passed). Service may still be warming up."
          exit 0
