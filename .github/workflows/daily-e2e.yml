name: Daily Playwright e2e

# Runs the Playwright suite against staging every day at 03:00 UTC.
# When no staging secrets are configured, falls back to localhost and
# auto-starts both Vite dev servers via the webServer config in
# playwright.config.ts — so the suite always executes.
# HTML + JUnit reports are uploaded as artifacts and committed under reports/e2e/.

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC daily
  workflow_dispatch:
    inputs:
      base_url_svox:
        description: "Sportivox base URL (leave blank to use staging secret or localhost)"
        required: false
        default: ""
      base_url_scoring:
        description: "Scoring base URL (leave blank to use staging secret or localhost)"
        required: false
        default: ""
permissions:
  contents: write
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SVOX_BASE_URL:    ${{ inputs.base_url_svox    || secrets.SVOX_STAGING_URL    || 'http://localhost:5173' }}
      SCORING_BASE_URL: ${{ inputs.base_url_scoring || secrets.SCORING_STAGING_URL || 'http://localhost:5174' }}
      SCORING_API_URL:  ${{ secrets.SCORING_API_URL || 'http://localhost:8081/api' }}
      SVOX_DEMO_PASSWORD:        ${{ secrets.SVOX_DEMO_PASSWORD || 'Demo1234!' }}
      SCORING_ADMIN_EMAIL:       ${{ secrets.SCORING_ADMIN_EMAIL || 'admin@scoring.local' }}
      SCORING_ADMIN_PASSWORD:    ${{ secrets.SCORING_ADMIN_PASSWORD || 'Demo1234!' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: e2e/package-lock.json

      # ── E2E test runner ────────────────────────────────────────────────────
      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright Chromium + system deps
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      # ── Sportivox frontend (needed when SVOX_BASE_URL is localhost) ────────
      - name: Install Sportivox frontend deps
        working-directory: frontend
        run: npm install --no-audit --no-fund

      # ── Scoring frontend (needed when SCORING_BASE_URL is localhost) ───────
      - name: Install Scoring frontend deps
        working-directory: scoring/frontend
        run: npm install --no-audit --no-fund

      # ── Run tests ──────────────────────────────────────────────────────────
      # playwright.config.ts will auto-start whichever Vite servers are needed
      # (localhost URLs only). set +e so we capture the exit code manually and
      # can still upload reports and commit the summary even on failure.
      - name: Run Playwright
        id: pw
        working-directory: e2e
        run: |
          set +e
          npx playwright test
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      # ── Artifacts ──────────────────────────────────────────────────────────
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-${{ github.run_id }}
          path: e2e/reports/html
          retention-days: 30

      - name: Upload JUnit + JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-summary-${{ github.run_id }}
          path: |
            e2e/reports/junit.xml
            e2e/reports/results.json
          retention-days: 30

      # ── Commit daily summary ───────────────────────────────────────────────
      - name: Commit summary report
        if: github.event_name != 'pull_request' && always()
        run: |
          DATE=$(date -u +%F)
          mkdir -p "reports/e2e/$DATE"
          cp e2e/reports/results.json "reports/e2e/$DATE/" 2>/dev/null || true
          cp e2e/reports/junit.xml   "reports/e2e/$DATE/" 2>/dev/null || true
          node -e "
            const fs = require('fs');
            let raw = '';
            try { raw = fs.readFileSync('reports/e2e/$DATE/results.json', 'utf8'); } catch {}
            const d = raw ? JSON.parse(raw) : {};
            const stats = d.stats || {};
            const total = (stats.expected||0) + (stats.unexpected||0) + (stats.flaky||0) + (stats.skipped||0);
            const md = [
              '# Playwright e2e — $DATE', '',
              '| Outcome | Count |', '|---|---|',
              '| Passed  | ' + (stats.expected  || 0) + ' |',
              '| Failed  | ' + (stats.unexpected || 0) + ' |',
              '| Flaky   | ' + (stats.flaky      || 0) + ' |',
              '| Skipped | ' + (stats.skipped    || 0) + ' |',
              '| **Total** | **' + total + '** |',
              '',
              'Artifacts: see GitHub Actions run ${{ github.run_id }}.',
              ''
            ].join('\n');
            fs.writeFileSync('reports/e2e/$DATE/summary.md', md);
            fs.writeFileSync('reports/e2e/latest.md', md);
          " || true

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/e2e || true
          if git diff --cached --quiet; then
            echo "No e2e report changes."
            exit 0
          fi
          git commit -m "chore(e2e): daily report $DATE"
          git push

      # ── Update rolling tracking issue ──────────────────────────────────────
      - name: Update tracking issue
        if: github.event_name != 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const DATE = new Date().toISOString().slice(0, 10);
            const path = `reports/e2e/${DATE}/summary.md`;
            let body = `Playwright run ${process.env.GITHUB_RUN_ID} — see Actions for HTML report.`;
            try { body = fs.readFileSync(path, "utf8"); } catch {}
            const title = "🧪 Daily Playwright e2e tracker";

            const { data: issues } = await github.rest.issues.listForRepo({
              ...context.repo, state: "open", labels: "e2e"
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({ ...context.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ ...context.repo, title, body, labels: ["e2e"] });
            }

      # ── Fail the run if any test failed ───────────────────────────────────
      - name: Fail run if any test failed
        if: steps.pw.outputs.exit_code != '0'
        run: |
          echo "::error::Playwright reported failures — see uploaded HTML report."
          exit 1
