# Cloud Run sends traffic to port 8080 by default — match it here.
server {
  listen 8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache static assets (filenames are content-hashed by Vite).
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Never cache the SPA entry point — it references content-hashed bundles.
  # Without this, browsers serve a stale index.html after a deploy and users
  # see the old JS bundle until they force-refresh.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # SPA fallback — every non-file route falls through to index.html.
  location / {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri /index.html;
  }

  # Quiet 404s for favicons that legitimately may not exist.
  location = /favicon.ico { try_files $uri =204; access_log off; }
}
