# nginx.conf — processed at container startup via envsubst.
# SCORING_API_URL is injected at runtime so the same image works in every env.
server {
  listen 8080 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Scoring backend proxy ────────────────────────────────────────────────────
  # Requests from /scoring-api/* are forwarded to the scoring backend.
  # SCORING_API_URL is set via Cloud Run env var (or docker-compose environment:).
  # Fallback default: http://127.0.0.1:1 (returns 502 when scoring not deployed).
  location /scoring-api/ {
    proxy_pass         ${SCORING_API_URL}/;
    proxy_http_version 1.1;
    proxy_set_header   Host              $proxy_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    proxy_connect_timeout 10s;
    proxy_read_timeout    60s;
  }

  # ── Static assets (content-hashed filenames) ─────────────────────────────────
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # ── SPA entry point — never cached ──────────────────────────────────────────
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────────
  location / {
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    try_files $uri /index.html;
  }

  location = /favicon.ico { try_files $uri =204; access_log off; }
}
