# Cloud Build pipeline for Sportivox.
# Trigger off pushes to `main` from the GitHub repo. Builds both images
# in parallel, pushes them to Artifact Registry, runs DB migrations, then
# rolls Cloud Run.
#
# Substitutions you must set on the trigger:
#   _REGION         e.g. asia-south1
#   _AR_REPO        e.g. sportivox
#   _API_SERVICE    e.g. sportivox-api-prod
#   _WEB_SERVICE    e.g. sportivox-web-prod
#   _WEB_APP_URL    e.g. https://app.sportivox.com
#   _API_PUBLIC_URL the api base URL the web app should call
#   _ENV            e.g. prod  (must match the suffix used in Secret Manager names)
#
# Secret Manager prerequisite (one-time setup per environment):
#   The migration step reads DIRECT_URL from Secret Manager.
#   Run `terraform apply` once after adding the direct_url variable — Terraform
#   creates the secret and populates it. Then ensure the Cloud Build service
#   account has roles/secretmanager.secretAccessor on the project (Terraform
#   handles this too via the cloudbuild_secret_accessor resource in main.tf).

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/sportivox-direct-url-${_ENV}/versions/latest
      env: DIRECT_URL

steps:
  # ── Build images in parallel ────────────────────────────────────────────────

  # API image
  - id: build-api
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:latest"
      - --target
      - runtime
      - ./backend

  # Web image
  - id: build-web
    name: gcr.io/cloud-builders/docker
    waitFor: ["-"]
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:$SHORT_SHA"
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:latest"
      - --target
      - runtime
      - --build-arg
      - "VITE_API_BASE_URL=${_API_PUBLIC_URL}"
      - ./frontend

  # ── Push images ─────────────────────────────────────────────────────────────

  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: ["build-api"]
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api"]

  - id: push-web
    name: gcr.io/cloud-builders/docker
    waitFor: ["build-web"]
    args: ["push", "--all-tags", "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web"]

  # ── Run database migrations ─────────────────────────────────────────────────
  # Runs inside the freshly-built API image so the migration files are in sync
  # with the code being deployed. Blocks deploy-api; if it fails the current
  # revision keeps serving traffic.

  - id: migrate
    name: "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA"
    waitFor: ["push-api"]
    entrypoint: sh
    secretEnv: ["DIRECT_URL"]
    args:
      - -c
      - |
        echo "Running Prisma migrations..."
        DATABASE_URL="$$DIRECT_URL" ./node_modules/.bin/prisma migrate deploy
        echo "Migrations complete."

  # ── Deploy ──────────────────────────────────────────────────────────────────

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: ["migrate"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_API_SERVICE}"
      - --image
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA"
      - --region
      - "${_REGION}"
      - --quiet

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    waitFor: ["push-web"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_WEB_SERVICE}"
      - --image
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:$SHORT_SHA"
      - --region
      - "${_REGION}"
      - --quiet

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/api:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/web:$SHORT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
