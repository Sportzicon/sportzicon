# Production-like Docker Compose
# Purpose: Test production builds locally before deploying to GCP
# Usage: docker compose -f docker-compose.prod.yml up --build
#
# ⚠️  THIS IS NOT THE SAME AS GCP CLOUD RUN
# - Uses local environment files for secrets
# - No real Firestore/GCS (still uses emulators or local configs)
# - Useful for testing production Docker images before push
#
# For real production deployment: use Terraform + Cloud Run

version: '3.9'

services:
  firestore:
    image: mtlynch/firestore-emulator:latest
    environment:
      FIRESTORE_PROJECT_ID: sportivox-dev
      PORT: 8081
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 10

  gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-public-host", "localhost:4443", "-port", "4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcs-data:/storage

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime  # ← Production target, not dev!
    environment:
      NODE_ENV: production  # ← Production mode
      PORT: 8080
      FIRESTORE_EMULATOR_HOST: firestore:8081  # ← Still uses emulator for testing
      STORAGE_EMULATOR_HOST: http://gcs:4443
      GCP_PROJECT_ID: sportivox-dev
      GCS_BUCKET_MEDIA: sportivox-media-dev
      GCS_BUCKET_DOCS: sportivox-docs-dev
      JWT_ACCESS_SECRET: prod-test-access-secret-min-64-chars
      JWT_REFRESH_SECRET: prod-test-refresh-secret-min-64-chars
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      BCRYPT_ROUNDS: 12  # ← Production level
      CORS_ORIGINS: http://localhost:5173  # ← Still allow local frontend
      WEB_APP_URL: http://localhost:5173
      PUBLIC_API_URL: http://localhost:8080
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100  # ← Production limits
      AUTH_RATE_LIMIT_MAX: 10
      LOG_LEVEL: info  # ← Production log level
      BOOTSTRAP_ADMIN_EMAIL: admin@sportivox.local
      BOOTSTRAP_ADMIN_PASSWORD: ChangeMe123!
    ports:
      - "8080:8080"
    depends_on:
      firestore:
        condition: service_healthy
      gcs:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime  # ← Production target, not dev!
      args:
        VITE_API_BASE_URL: http://localhost:8080  # ← Local API for testing
    environment:
      # Empty - runtime uses pre-built static files
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  gcs-data: {}
