# Production-like Docker Compose — test production builds locally before deploying to GCP.
# Usage: docker compose -f docker-compose.prod.yml up --build
# Requires a .env.prod file with real DATABASE_URL, DIRECT_URL, JWT secrets, etc.
# For real production deployment use Terraform + Cloud Run.

version: '3.9'

services:
  gcs:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-public-host", "localhost:4443", "-port", "4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcs-data:/storage

  api:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: runtime
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 8080
      STORAGE_EMULATOR_HOST: http://gcs:4443
      LOG_LEVEL: info
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_MAX: 10
    ports:
      - "8080:8080"
    depends_on:
      gcs:
        condition: service_started

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  gcs-data: {}
